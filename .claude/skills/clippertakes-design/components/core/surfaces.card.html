<head>

    function Demo() {
      return (
        <div className="grid">
          <Card padding="md">
            <div className="lbl">Tone pills</div>
            <div className="pills">
              <Badge tone="petrol">New this week</Badge>
              <Badge tone="accent">Story 24 added</Badge>

              Community organizer · Story 07 / 50<br/>Recorded at the Afrikaandermarkt, March 2026

    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
