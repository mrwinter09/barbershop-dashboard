<!-- @dsCard group="Spacing" viewport="700x170" name="Radius" subtitle="Nearly-square, editorial: 3 → 12px plus pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); display:flex; gap:20px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width: 84px; height: 64px; background: var(--paper-100); border: 1px solid var(--border-default); }
  .name { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); margin-top: 8px; }
  .px { font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">sm</div><div class="px">3px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">md</div><div class="px">5px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">lg</div><div class="px">8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="name">xl</div><div class="px">12px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-full); width:64px"></div><div class="name">full</div><div class="px">pill</div></div>
</body>
</html>
