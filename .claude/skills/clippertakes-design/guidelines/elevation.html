<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft, warm, petrol-tinted shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 30px 24px; font-family: var(--font-sans); display:flex; gap:26px; align-items:center; }
  .item { text-align:center; }
  .box { width: 96px; height: 64px; background: var(--surface-card); border-radius: var(--radius-lg); }
  .name { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="name">shadow-xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="name">shadow-sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="name">shadow-md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="name">shadow-lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--ring-focus)"></div><div class="name">ring-focus</div></div>
</body>
</html>
