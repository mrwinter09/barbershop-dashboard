<!-- @dsCard group="Colors" viewport="700x150" name="Story status" subtitle="upcoming → published → withdrawn (not scheduled/completed)" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;font-family:var(--font-sans);display:flex;gap:14px;flex-wrap:wrap}
  .chip{display:flex;flex-direction:column;gap:8px;flex:1;min-width:170px}
  .tag{display:inline-flex;align-items:center;gap:7px;align-self:flex-start;padding:5px 13px;border-radius:var(--radius-full);font-size:13px;font-weight:600}
  .tag::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
  .desc{font-size:12.5px;color:var(--text-muted);line-height:1.5}
  .desc b{color:var(--text-strong);font-weight:600}
</style></head>
<body>
  <div class="chip">
    <span class="tag" style="color:var(--status-upcoming-fg);background:var(--status-upcoming-bg)">In the chair soon</span>
    <span class="desc"><b>upcoming</b> — submitted, session not yet recorded. Portrait shows greyed.</span>
  </div>
  <div class="chip">
    <span class="tag" style="color:var(--status-published-fg);background:var(--status-published-bg)">Story published</span>
    <span class="desc"><b>published</b> — the portrait is live and counts toward 50.</span>
  </div>
  <div class="chip">
    <span class="tag" style="color:var(--status-withdrawn-fg);background:var(--status-withdrawn-bg)">Withdrawn</span>
    <span class="desc"><b>withdrawn</b> — participant stepped back; hidden from the board.</span>
  </div>
</body></html>
