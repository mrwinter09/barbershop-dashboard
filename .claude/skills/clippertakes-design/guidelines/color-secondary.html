<!-- @dsCard group="Colors" viewport="700x150" name="Secondary — coffee, clay, moss" subtitle="The warm editorial hues beneath petrol" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;font-family:var(--font-sans)}
  .grp{margin-bottom:8px}
  .row{display:flex;gap:8px}
  .sw{flex:1;border-radius:var(--radius-md);height:74px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;box-sizing:border-box}
  .sw .v{font-family:var(--font-mono);font-size:10px}
  .sw .n{font-size:11px;font-weight:600;margin-bottom:1px}
  .dark .n,.dark .v{color:var(--paper-0)}
  .light .n,.light .v{color:var(--ink-900)}
</style></head>
<body>
  <div class="grp"><div class="row">
    <div class="sw dark" style="background:var(--coffee-900)"><span class="n">coffee-900</span><span class="v">#261A12</span></div>
    <div class="sw dark" style="background:var(--coffee-700)"><span class="n">coffee-700</span><span class="v">#3F2D20</span></div>
    <div class="sw dark" style="background:var(--coffee-500)"><span class="n">coffee-500</span><span class="v">#6A5440</span></div>
    <div class="sw dark" style="background:var(--clay-600)"><span class="n">clay-600</span><span class="v">#AE5234</span></div>
    <div class="sw dark" style="background:var(--clay-500)"><span class="n">clay-500</span><span class="v">#C26B4A</span></div>
    <div class="sw light" style="background:var(--clay-100)"><span class="n">clay-100</span><span class="v">#F1DACB</span></div>
    <div class="sw dark" style="background:var(--moss-700)"><span class="n">moss-700</span><span class="v">#4C5A34</span></div>
    <div class="sw dark" style="background:var(--moss-600)"><span class="n">moss-600</span><span class="v">#5E6E44</span></div>
    <div class="sw light" style="background:var(--moss-100)"><span class="n">moss-100</span><span class="v">#DEE3CC</span></div>
  </div></div>
</body></html>
