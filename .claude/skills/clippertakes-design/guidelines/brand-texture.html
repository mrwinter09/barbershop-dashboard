<!-- @dsCard group="Brand" viewport="700x170" name="Paper texture" subtitle="The faint warm grain under every surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); display:flex; gap:16px; }
  .swatch { flex:1; height: 128px; border-radius: var(--radius-lg); border: 1px solid var(--border-hairline);
    display:flex; align-items:flex-end; padding:12px; box-sizing:border-box; }
  .page { background-color: var(--paper-50); background-image: var(--paper-texture); }
  .card { background-color: var(--paper-0); background-image: var(--paper-texture); box-shadow: var(--shadow-sm); }
  .ink { background-color: var(--petrol-900); background-image: var(--paper-texture); }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-wide); text-transform:uppercase; color: var(--text-muted); }
  .ink .lbl { color: var(--petrol-100); }
</style>
</head>
<body>
  <div class="swatch page"><span class="lbl">page · paper-50</span></div>
  <div class="swatch card"><span class="lbl">card · paper-0</span></div>
  <div class="swatch ink"><span class="lbl">inverse · petrol-900</span></div>
</body>
</html>
