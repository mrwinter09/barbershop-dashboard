<!-- @dsCard group="Colors" viewport="700x150" name="Paper & ink — warm neutrals" subtitle="The off-white paper ground and warm ink for text" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;font-family:var(--font-sans)}
  .row{display:flex;gap:8px;margin-bottom:8px}
  .sw{flex:1;border-radius:var(--radius-md);height:74px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;box-sizing:border-box}
  .sw .v{font-family:var(--font-mono);font-size:10px}
  .sw .n{font-size:11px;font-weight:600;margin-bottom:1px}
  .light .n,.light .v{color:var(--ink-900)}
  .dark .n,.dark .v{color:var(--paper-0)}
</style></head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--paper-0);box-shadow:inset 0 0 0 1px var(--border-hairline)"><span class="n">paper-0 ·card</span><span class="v">#FCF8F0</span></div>
    <div class="sw light" style="background:var(--paper-50);box-shadow:inset 0 0 0 1px var(--border-hairline)"><span class="n">paper-50 ·page</span><span class="v">#F5EEDF</span></div>
    <div class="sw light" style="background:var(--paper-100)"><span class="n">paper-100</span><span class="v">#ECE2CC</span></div>
    <div class="sw light" style="background:var(--paper-200)"><span class="n">paper-200</span><span class="v">#E0D3B8</span></div>
    <div class="sw light" style="background:var(--paper-300)"><span class="n">paper-300</span><span class="v">#CBB994</span></div>
  </div>
  <div class="row">
    <div class="sw dark" style="background:var(--ink-900)"><span class="n">ink-900 ·head</span><span class="v">#211A12</span></div>
    <div class="sw dark" style="background:var(--coffee-700)"><span class="n">coffee-700 ·body</span><span class="v">#3F2D20</span></div>
    <div class="sw dark" style="background:var(--ink-500)"><span class="n">ink-500 ·muted</span><span class="v">#6E6453</span></div>
    <div class="sw light" style="background:var(--ink-400)"><span class="n">ink-400 ·faint</span><span class="v">#968A75</span></div>
  </div>
</body></html>
