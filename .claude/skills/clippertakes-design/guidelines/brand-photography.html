<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
  .tile { position:relative; height: 156px; border-radius: var(--radius-lg); overflow:hidden; box-shadow: var(--shadow-sm); }
  .tile img { width:100%; height:100%; object-fit: cover; }
  .tile.lead .scrim { position:absolute; inset:0; background: linear-gradient(to top, var(--scrim-70), transparent 60%); }
  .tile.lead .cap { position:absolute; left:16px; bottom:14px; color:var(--paper-0); }
  .cap h4 { font-family: var(--font-serif); font-size: 22px; letter-spacing: -.01em; }
  .cap p { font-family: var(--font-mono); font-size: 10px; color: var(--petrol-100); letter-spacing: var(--tracking-wide); text-transform:uppercase; margin-top:3px; }
  .note { font-size: 12px; color: var(--text-faint); margin-top: 12px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile lead">
      <img src="../assets/img/interior-1.jpg" alt="" />
      <div class="scrim"></div>
      <div class="cap"><h4>In the chair</h4><p>Full-bleed · scrim · serif type</p></div>
    </div>
    <div class="tile"><img src="../assets/img/hero.jpg" alt="" /></div>
    <div class="tile"><img src="../assets/img/interior-3.jpg" alt="" /></div>
  </div>
  <div class="note">Warm, close, documentary — the clippers running, hands, faces, the travelling chair. Real Rotterdam light and grain, never flat stock. Placeholder shots here; swap in real session photography.</div>
</body>
</html>
