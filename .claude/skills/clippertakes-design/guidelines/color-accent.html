<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Rotterdam yellow & orange" subtitle="Used sparingly: the loud invitation" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;font-family:var(--font-sans)}
  .row{display:flex;gap:8px}
  .sw{flex:1;border-radius:var(--radius-md);height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;box-sizing:border-box}
  .sw .v{font-family:var(--font-mono);font-size:10px}
  .sw .n{font-size:11px;font-weight:600;margin-bottom:1px}
  .light .n,.light .v{color:var(--ink-900)}
  .dark .n,.dark .v{color:var(--paper-0)}
</style></head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--yellow-500)"><span class="n">yellow-500 ·Rotterdam</span><span class="v">#F2C200</span></div>
    <div class="sw light" style="background:var(--yellow-400)"><span class="n">yellow-400</span><span class="v">#FFD22E</span></div>
    <div class="sw light" style="background:var(--yellow-200)"><span class="n">yellow-200</span><span class="v">#FAE48A</span></div>
    <div class="sw light" style="background:var(--yellow-100)"><span class="n">yellow-100</span><span class="v">#FBEFBF</span></div>
    <div class="sw dark" style="background:var(--orange-600)"><span class="n">orange-600</span><span class="v">#D2632A</span></div>
    <div class="sw dark" style="background:var(--orange-500)"><span class="n">orange-500</span><span class="v">#E47B3C</span></div>
    <div class="sw light" style="background:var(--orange-100)"><span class="n">orange-100</span><span class="v">#F8E0CB</span></div>
  </div>
</body></html>
