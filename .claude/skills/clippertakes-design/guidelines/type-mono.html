<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-mono)}
  .big{font-size:34px;font-weight:700;letter-spacing:.04em;color:var(--text-strong)}
  .big em{font-style:normal;color:var(--clay-600)}
  .row{display:flex;flex-wrap:wrap;gap:10px 22px;margin-top:18px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted)}
  .row span{border-bottom:2px solid var(--yellow-500);padding-bottom:3px}
</style></head>
<body>
  <div class="big">STORY <em>07</em> / 50</div>
  <div class="row">
    <span>Rotterdam · 2026</span>
    <span>Explore the archive</span>
    <span>14 MAR 2026</span>
    <span>23 / 50 collected</span>
  </div>
</body></html>
