<!-- @dsCard group="Colors" viewport="700x150" name="Petrol — primary" subtitle="The deep petrol-blue that carries the brand" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;font-family:var(--font-sans)}
  .row{display:flex;gap:8px}
  .sw{flex:1;border-radius:var(--radius-md);height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;box-sizing:border-box}
  .sw .v{font-family:var(--font-mono);font-size:10px;letter-spacing:.04em}
  .sw .n{font-size:11px;font-weight:600;margin-bottom:1px}
  .dark .n,.dark .v{color:var(--paper-0)}
  .light .n,.light .v{color:var(--ink-900)}
</style></head>
<body>
  <div class="row">
    <div class="sw dark" style="background:var(--petrol-900)"><span class="n">900</span><span class="v">#0C2A30</span></div>
    <div class="sw dark" style="background:var(--petrol-800)"><span class="n">800</span><span class="v">#103840</span></div>
    <div class="sw dark" style="background:var(--petrol-700)"><span class="n">700 ·primary</span><span class="v">#15454F</span></div>
    <div class="sw dark" style="background:var(--petrol-600)"><span class="n">600</span><span class="v">#1C5862</span></div>
    <div class="sw dark" style="background:var(--petrol-500)"><span class="n">500</span><span class="v">#2A6E79</span></div>
    <div class="sw light" style="background:var(--petrol-300)"><span class="n">300</span><span class="v">#79A6AD</span></div>
    <div class="sw light" style="background:var(--petrol-100)"><span class="n">100</span><span class="v">#CBDEE0</span></div>
    <div class="sw light" style="background:var(--petrol-50);box-shadow:inset 0 0 0 1px var(--border-hairline)"><span class="n">50</span><span class="v">#E9F1F1</span></div>
  </div>
</body></html>
